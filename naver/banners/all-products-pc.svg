<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="480" viewBox="0 0 1920 480">
  <!-- 전체상품 (store landing) banner — the brand layer.
       v3 system: solid panel, straight edge, product photo, three text
       elements, seal-red period. Photo = the workbench with the whole
       catalog being made. -->
  <defs>
    <clipPath id="photoClip">
      <rect x="960" y="0" width="960" height="480"/>
    </clipPath>
  </defs>
  <rect width="1920" height="480" fill="#f6f6f2"/>
  <image href="file:///Users/jmonnet/Programming/StudioMonjo/studiomonjo-website/media/web/notebooks/robey-editions-process-table.jpg" x="960" y="-150" width="1100" height="619" preserveAspectRatio="xMidYMid slice" clip-path="url(#photoClip)"/>
  <g font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif">
    <text x="114" y="148" font-size="30" font-weight="800" letter-spacing="3" fill="#5e5e58">스튜디오몬조</text>
    <text x="112" y="236" font-size="60" font-weight="900" fill="#171717">프랑스의 교실에서,</text>
    <text x="112" y="312" font-size="60" font-weight="900" fill="#171717">서울의 작업실로<tspan fill="#B8231D">.</tspan></text>
    <text x="114" y="378" font-size="28" font-weight="600" fill="#4a4a46">만년필이 편한 손제본 노트. 한 권씩 손으로 만듭니다.</text>
  </g>
</svg>
