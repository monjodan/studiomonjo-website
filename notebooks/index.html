<!DOCTYPE html>
<!--
  /notebooks/ (root) — single-hop redirect to the locale-appropriate
  Notebooks page. Previously chained through /en/shop/ which itself
  redirected to /en/notebooks/ (two hops). Collapsed to one.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notebooks. Studio Monjo.</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://studiomonjo.com/en/notebooks/">
<script>
(function () {
  try {
    var saved = null;
    try { saved = localStorage.getItem('sm-lang'); } catch (e) {}
    var browser = (navigator.language || navigator.userLanguage || '').toLowerCase();
    var locale = saved || (browser.indexOf('fr') === 0 ? 'fr' : (browser.indexOf('ko') === 0 ? 'ko' : 'en'));
    if (locale !== 'en' && locale !== 'ko' && locale !== 'fr') locale = 'en';
    location.replace('../' + locale + '/notebooks/');
  } catch (e) { location.replace('../en/notebooks/'); }
})();
</script>
<noscript><meta http-equiv="refresh" content="0; url=../en/notebooks/"></noscript>
</head>
<body><p style="font-family:system-ui,sans-serif;padding:24px;color:#6e6e6e;">Notebooks. <a href="../en/notebooks/">English</a> · <a href="../fr/notebooks/">Français</a> · <a href="../ko/notebooks/">한국어</a></p></body>
</html>
