<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Monjo. Notebooks moved to the Shop.</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://studiomonjo.com/en/shop/">
<script>
(function () {
  try {
    var saved = null;
    try { saved = localStorage.getItem('sm-lang'); } catch (e) {}
    var browser = (navigator.language || navigator.userLanguage || '').toLowerCase();
    var locale = saved || (browser.indexOf('ko') === 0 ? 'ko' : 'en');
    if (locale !== 'en' && locale !== 'ko') locale = 'en';
    location.replace('/' + locale + '/shop/#notebook');
  } catch (e) { location.replace('/en/shop/#notebook'); }
})();
</script>
<noscript><meta http-equiv="refresh" content="0; url=/en/shop/#notebook"></noscript>
</head>

</html>
